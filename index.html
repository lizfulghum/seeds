<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liz's Plant Share 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f8faf6;
            color: #3a4a3d;
            line-height: 1.7;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d4e4d7;
            box-shadow: 0 2px 12px rgba(76, 110, 82, 0.08);
        }

        .header {
            background: #4a6e4f;
            color: #f8faf6;
            padding: 50px 35px 40px;
            text-align: center;
            border-bottom: 3px solid #7a9d7f;
        }

        .header h1 {
            font-size: 2.4em;
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .header p {
            opacity: 0.92;
            font-size: 1.05em;
            font-style: italic;
        }

        .last-updated {
            background: rgba(255,255,255,0.12);
            display: inline-block;
            padding: 8px 18px;
            border-radius: 3px;
            font-size: 0.85em;
            margin-top: 18px;
            font-style: normal;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .content {
            padding: 45px 35px;
        }

        .category {
            margin-bottom: 45px;
        }

        .category:last-child {
            margin-bottom: 0;
        }

        .category-title {
            font-size: 1.7em;
            font-weight: 400;
            color: #4a6e4f;
            margin-bottom: 22px;
            padding-bottom: 12px;
            border-bottom: 2px solid #d4e4d7;
            letter-spacing: 0.5px;
        }

        .variety {
            background: #fafcfa;
            padding: 22px 24px;
            margin-bottom: 16px;
            border: 1px solid #e8f0ea;
            border-left: 4px solid #7a9d7f;
            transition: all 0.25s ease;
        }

        .variety:hover {
            background: #f4f8f5;
            border-left-color: #4a6e4f;
            box-shadow: 0 1px 4px rgba(76, 110, 82, 0.12);
        }

        .variety-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #3a4a3d;
            margin-bottom: 7px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .variety-description {
            color: #5a6a5d;
            font-size: 0.98em;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            padding: 32px;
            color: #7a9d7f;
            font-size: 0.95em;
            border-top: 2px solid #e8f0ea;
            background: #fafcfa;
        }

        .emoji {
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .category-title {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 <span id="pageTitle">Liz's 2026 Plant Share</span></h1>
            <p id="pageDescription">Starter plants available for friends</p>
            <div class="last-updated">
                Last updated: <span id="lastUpdated">March 1, 2026</span>
            </div>
        </div>

        <div class="content" id="seedContent">
            <!-- Content loaded from JSON -->
        </div>

        <div class="footer">
            <p>🪴 Want some plants? Just ask!</p>
        </div>
    </div>

    <script>
        // Load seed data
        fetch('seeds-data.json')
            .then(response => response.json())
            .then(data => {
                // Update header
                document.getElementById('pageTitle').textContent = data.title;
                document.getElementById('pageDescription').textContent = data.description;
                
                // Format date
                const date = new Date(data.lastUpdated);
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('lastUpdated').textContent = date.toLocaleDateString('en-US', options);

                // Build categories
                const contentDiv = document.getElementById('seedContent');
                contentDiv.innerHTML = '';

                data.categories.forEach(category => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';

                    const categoryTitle = document.createElement('h2');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = category.name;
                    categoryDiv.appendChild(categoryTitle);

                    category.varieties.forEach(variety => {
                        const varietyDiv = document.createElement('div');
                        varietyDiv.className = 'variety';

                        const varietyName = document.createElement('div');
                        varietyName.className = 'variety-name';
                        varietyName.textContent = variety.name;
                        varietyDiv.appendChild(varietyName);

                        const varietyDesc = document.createElement('div');
                        varietyDesc.className = 'variety-description';
                        varietyDesc.textContent = variety.description;
                        varietyDiv.appendChild(varietyDesc);

                        categoryDiv.appendChild(varietyDiv);
                    });

                    contentDiv.appendChild(categoryDiv);
                });
            })
            .catch(error => {
                console.error('Error loading seed data:', error);
                document.getElementById('seedContent').innerHTML = 
                    '<p style="text-align: center; color: #e74c3c;">Unable to load seed data. Please refresh the page.</p>';
            });
    </script>
</body>
</html>
